version: '2.4'

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hll_logs
      POSTGRES_USER: hll
      POSTGRES_PASSWORD: hll
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data

  hlllogutilities:
    mem_limit: 512m
    restart: unless-stopped
    build: .
    depends_on:
      - postgres
    environment:
      HLU_POSTGRES_HOST: postgres
      HLU_POSTGRES_PORT: 5432
      HLU_POSTGRES_DB: hll_logs
      HLU_POSTGRES_USER: hll
      HLU_POSTGRES_PASSWORD: hll
    volumes:
      - ./config.ini:/code/config.ini
      # TODO: Sessions is not created before started first (unless done manually)
      - ./sessions.db:/code/sessions.db

  hlu-web:
    mem_limit: 256m
    restart: unless-stopped
    build: .
    depends_on:
      - postgres
    command: ["sh", "-c", "gunicorn --bind 0.0.0.0:${PORT:-8080} webapp:app"]
    environment:
      HLU_POSTGRES_HOST: postgres
      HLU_POSTGRES_PORT: 5432
      HLU_POSTGRES_DB: hll_logs
      HLU_POSTGRES_USER: hll
      HLU_POSTGRES_PASSWORD: hll
      HLU_WEB_HOST: 0.0.0.0
      HLU_WEB_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./config.ini:/code/config.ini
      - ./sessions.db:/code/sessions.db

volumes:
  postgres_data:
